# 分开部署：前端、后端各自独立镜像，便于水平扩展 / 负载均衡。
#
# 用法：
#   1. cp backend/.env.example backend/.env   （并修改生产密钥）
#   2. cp frontend/.env.example frontend/.env （默认 BACKEND_URL=http://backend:8000）
#   3. docker compose -f docker-compose.split.yml up
#
# 注：多副本负载均衡（scale backend=N）需切 PostgreSQL，SQLite 单文件不支持多写。

services:
  backend:
    build:
      context: .
      target: backend
    image: livecalc:backend
    expose:
      - "8000"                # 仅 compose 内部网络，不映射宿主；前端 nginx 反代访问
    env_file:
      - backend/.env
    volumes:
      - ./data:/app/data
      - ./static:/app/static
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    image: livecalc:frontend
    ports:
      - "${APP_PORT:-80}:80"
    env_file:
      - frontend/.env         # 含 BACKEND_URL；脱 compose 裸部署时改成后端实际地址
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
