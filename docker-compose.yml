# 统一部署：前后端 + nginx 同容器，一个端口访问完整应用。
#
# 用法：
#   1. cp backend/.env.example backend/.env   （并修改生产密钥 JWT_SECRET_KEY 等）
#   2. docker compose up
#
# 挂载点（均可省略，但生产建议保留以持久化）：
#   - backend/.env  → env_file 注入后端配置（持久化在宿主文件）
#   - ./data        → SQLite 库 + 导入数据（省略则容器内 ephemeral，重启丢库）
#   - ./static      → 上传图片
#   - ./logs        → 运行日志

services:
  app:
    build:
      context: .
      target: all-in-one
    image: livecalc:all-in-one
    container_name: livecalc
    ports:
      - "${APP_PORT:-80}:80"
    env_file:
      - backend/.env          # 不存在则 compose 报错：先 cp backend/.env.example backend/.env
    volumes:
      - ./data:/app/data
      - ./static:/app/static
      - ./logs:/app/logs
    restart: unless-stopped
